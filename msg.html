<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NS. — anonymous messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Space Mono', monospace;
      color: #e0d8cc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #app {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    #header {
      padding: 32px 24px 16px;
      border-bottom: 1px solid #1e1e2a;
      position: sticky;
      top: 0;
      background: #0a0a0f;
      z-index: 10;
    }

    #header .title-row { display: flex; align-items: baseline; gap: 12px; }

    #header h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 400;
      color: #e0d8cc;
      letter-spacing: -0.5px;
    }

    #header .subtitle { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; }

    #identity { margin-top: 8px; font-size: 11px; color: #3a3a4a; display: flex; align-items: center; gap: 6px; }
    #identity .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a5a3a; display: inline-block; }
    #identity span.name { color: #7a6a5a; }

    #messages { flex: 1; padding: 24px 16px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }

    .msg-wrap { display: flex; flex-direction: column; margin-bottom: 12px; animation: fadeSlide 0.3s ease forwards; }
    .msg-wrap.mine { align-items: flex-end; }
    .msg-wrap.theirs { align-items: flex-start; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta { font-size: 10px; color: #3a3a4a; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

    .msg-bubble { max-width: 78%; padding: 10px 14px; font-family: 'Space Mono', monospace; font-size: 13px; line-height: 1.6; word-break: break-word; }

    .mine .msg-bubble { background: #1e1a14; border: 1px solid #3a2e22; border-radius: 12px 12px 2px 12px; color: #d4c8b4; }
    .theirs .msg-bubble { background: #13131c; border: 1px solid #1e1e2e; border-radius: 12px 12px 12px 2px; color: #c0b8cc; }

    #input-area { padding: 16px; border-top: 1px solid #1e1e2a; background: #0a0a0f; position: sticky; bottom: 0; z-index: 10; }

    #flash { font-size: 11px; color: #5a8a5a; margin-bottom: 8px; letter-spacing: 1px; min-height: 16px; }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1;
      background: #111118;
      border: 1px solid #222230;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0d8cc;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      height: 60px;
    }

    #msg-input:focus { outline: none; border-color: #6b5a46; }
    #msg-input::placeholder { color: #333; }

    .input-side { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

    #char-count { font-size: 10px; color: #333; letter-spacing: 1px; }
    #char-count.warn { color: #8a4a3a; }

    #send-btn {
      background: transparent;
      border: 1px solid #4a3a2a;
      color: #9a8a7a;
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: #c8b49a; color: #0a0a0f; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="title-row">
      <h1>NS.</h1>
      <span class="subtitle">anonymous messages</span>
    </div>
    <div id="identity">
      <span class="dot"></span>
      You are <span class="name" id="my-name"></span>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="flash"></div>
    <div class="input-row">
      <textarea id="msg-input" placeholder="whisper something into the void..." maxlength="280" rows="2"></textarea>
      <div class="input-side">
        <span id="char-count">0/280</span>
        <button id="send-btn" disabled>send →</button>
      </div>
    </div>
  </div>
</div>

<script>
  const ADJECTIVES = ["Silent","Shadow","Hollow","Ashen","Drifting","Nameless","Veiled","Pale","Lost","Echoing"];
  const ANIMALS    = ["Fox","Wolf","Bear","Owl","Hawk","Lynx","Deer","Crow","Moth","Viper","Raven","Ghost"];

  function getAnonId() {
    let id = sessionStorage.getItem("anonId");
    if (!id) { id = Math.random().toString(36).slice(2, 9); sessionStorage.setItem("anonId", id); }
    return id;
  }

  function getAnonName(id) {
    const hash = id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
    return `${ADJECTIVES[hash % ADJECTIVES.length]} ${ANIMALS[(hash * 7) % ANIMALS.length]}`;
  }

  const MY_ID = getAnonId();
  document.getElementById("my-name").textContent = getAnonName(MY_ID);

  const messages = [
    { id: "s1", text: "this app feels like whispering into the void", anonId: "abc123", ts: Date.now() - 90000 },
    { id: "s2", text: "anyone else just here to say something they can't say elsewhere?", anonId: "xyz789", ts: Date.now() - 60000 },
    { id: "s3", text: "anonymity is both a gift and a curse", anonId: "def456", ts: Date.now() - 30000 },
  ];

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    return Math.floor(diff / 3600) + "h ago";
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function renderMessage(msg) {
    const isMe = msg.anonId === MY_ID;
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (isMe ? "mine" : "theirs");
    wrap.innerHTML = `
      <div class="msg-meta">${isMe ? "you" : getAnonName(msg.anonId)} · ${timeAgo(msg.ts)}</div>
      <div class="msg-bubble">${escapeHtml(msg.text)}</div>
    `;
    return wrap;
  }

  const msgBox = document.getElementById("messages");
  messages.forEach(m => msgBox.appendChild(renderMessage(m)));
  msgBox.scrollTop = msgBox.scrollHeight;

  const input    = document.getElementById("msg-input");
  const sendBtn  = document.getElementById("send-btn");
  const charSpan = document.getElementById("char-count");
  const flash    = document.getElementById("flash");

  input.addEventListener("input", () => {
    const len = input.value.length;
    charSpan.textContent = len + "/280";
    charSpan.className   = len > 240 ? "warn" : "";
    sendBtn.disabled     = input.value.trim().length === 0;
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });

  sendBtn.addEventListener("click", sendMessage);

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    sendBtn.textContent = "···";
    setTimeout(() => {
      const msg = { id: Date.now().toString(), text, anonId: MY_ID, ts: Date.now() };
      messages.push(msg);
      msgBox.appendChild(renderMessage(msg));
      msgBox.scrollTop = msgBox.scrollHeight;
      input.value = "";
      charSpan.textContent = "0/280";
      charSpan.className = "";
      sendBtn.textContent = "send →";
      sendBtn.disabled = true;
      flash.textContent = "Message sent into the void ✓";
      setTimeout(() => flash.textContent = "", 2000);
    }, 400);
  }
</script>
</body>
</html>
