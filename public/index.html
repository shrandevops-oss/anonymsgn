<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ghost.</title>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ghost."/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0e0e16;--bdr:#1e1e2a;--txt:#e0d8cc;--dim:#3a3a4a;--acc:#6b5a46;--hi:#c8b49a;--mbg:#1e1a14;--mbdr:#3a2e22;--mtxt:#d4c8b4;--tbg:#13131c;--tbdr:#1e1e2e;--ttxt:#c0b8cc}
[data-theme=ocean]{--bg:#050d1a;--bg2:#071122;--bdr:#0e2040;--txt:#c8e0f0;--dim:#1a4a6a;--acc:#1a6a9a;--hi:#4ab0e0;--mbg:#071830;--mbdr:#0a3060;--mtxt:#a0d0f0;--tbg:#050d1a;--tbdr:#0e2040;--ttxt:#80b8e0}
[data-theme=forest]{--bg:#050f08;--bg2:#071410;--bdr:#0e2818;--txt:#c8e8c0;--dim:#1a4a20;--acc:#2a6a30;--hi:#60c060;--mbg:#071a10;--mbdr:#0a3018;--mtxt:#a0d890;--tbg:#050f08;--tbdr:#0e2818;--ttxt:#80c878}
[data-theme=sunset]{--bg:#120508;--bg2:#1a0810;--bdr:#2a1020;--txt:#f0d0c8;--dim:#4a2838;--acc:#8a2040;--hi:#e06080;--mbg:#1e0a14;--mbdr:#3a1028;--mtxt:#e8b0c0;--tbg:#120508;--tbdr:#2a1020;--ttxt:#d890a8}
[data-theme=light]{--bg:#f5f0eb;--bg2:#ede8e0;--bdr:#d0c8c0;--txt:#2a2018;--dim:#8a8070;--acc:#8a6a40;--hi:#5a3a18;--mbg:#e8ddd0;--mbdr:#c8b8a0;--mtxt:#2a1808;--tbg:#f0ece8;--tbdr:#d8d0c8;--ttxt:#3a3028}
body{min-height:100vh;background:var(--bg);font-family:'Space Mono',monospace;color:var(--txt);display:flex;flex-direction:column;align-items:center;padding-top:env(safe-area-inset-top)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
#setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.box{width:100%;max-width:400px;border:1px solid var(--bdr);border-radius:12px;padding:26px;background:var(--bg2)}
.box h2{font-family:'Playfair Display',serif;font-style:italic;font-size:28px;font-weight:400;margin-bottom:3px}
.box>p{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:22px}
label{display:block;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;margin-top:14px}
input[type=text],input[type=password]{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:12px;color:var(--txt);font-family:'Space Mono',monospace;font-size:16px;display:block;transition:border-color .2s}
input:focus{outline:none;border-color:var(--acc)}input::placeholder{color:var(--dim);opacity:.4}
.hint{font-size:10px;color:var(--dim);opacity:.4;margin-top:4px}
.tdots{display:flex;gap:8px;margin-top:8px}
.tdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.tdot.on,.tdot:hover{transform:scale(1.2)}
.tdot[data-t=""]{background:#0a0a0f;border-color:#4a3a2a}.tdot.on[data-t=""]{border-color:#c8b49a}
.tdot[data-t=ocean]{background:#050d1a;border-color:#1a6a9a}.tdot.on[data-t=ocean]{border-color:#4ab0e0}
.tdot[data-t=forest]{background:#050f08;border-color:#2a6a30}.tdot.on[data-t=forest]{border-color:#60c060}
.tdot[data-t=sunset]{background:#120508;border-color:#8a2040}.tdot.on[data-t=sunset]{border-color:#e06080}
.tdot[data-t=light]{background:#f5f0eb;border-color:#8a6a40}.tdot.on[data-t=light]{border-color:#5a3a18}
#serr{font-size:11px;color:#c05050;margin-top:8px;min-height:16px}
.gbtn{width:100%;background:transparent;border:1px solid var(--acc);color:var(--hi);border-radius:6px;padding:14px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;margin-top:16px}
.gbtn:hover:not(:disabled){background:var(--hi);color:var(--bg)}.gbtn:disabled{opacity:.4;cursor:not-allowed}
.sinfo{margin-top:12px;font-size:10px;color:var(--dim);opacity:.2;text-align:center;padding:6px;border:1px solid var(--bdr);border-radius:6px}
#spin{display:none;position:fixed;inset:0;background:rgba(10,10,15,.96);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#spin.on{display:flex}
.sp{width:32px;height:32px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#spin p{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
#spin small{font-size:10px;color:var(--dim);opacity:.4}
#app{width:100%;max-width:640px;display:none;flex-direction:column;height:100vh;height:-webkit-fill-available;z-index:1}
#hdr{padding:12px 16px 10px;border-bottom:1px solid var(--bdr);background:var(--bg);flex-shrink:0;position:relative;z-index:20}
.hrow{display:flex;align-items:center;justify-content:space-between}
#hdr h1{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;font-weight:400}
.hbtns{display:flex;gap:5px;align-items:center}
.hbtn{background:transparent;border:1px solid var(--bdr);color:var(--dim);border-radius:6px;padding:4px 7px;font-size:13px;cursor:pointer;transition:all .2s}
.hbtn:hover{border-color:var(--acc);color:var(--txt)}
#rbadge{font-size:10px;color:var(--dim);border:1px solid var(--bdr);padding:3px 6px;border-radius:4px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#onlinebadge{font-size:10px;color:#4a9a4a;border:1px solid #1a4a1a;padding:3px 7px;border-radius:4px;display:flex;align-items:center;gap:4px}
.gdot{width:5px;height:5px;border-radius:50%;background:#4a9a4a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#idn{margin-top:4px;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;background:#3a6a3a}
#idn .nm{color:var(--acc)}
.panel{display:none;position:absolute;top:62px;right:14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px;z-index:100;box-shadow:0 6px 24px rgba(0,0,0,.7)}
.panel.on{display:block}
.ptitle{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.tprow{display:flex;gap:8px}
#sharepanel{min-width:220px}
#shareurl{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--txt);font-family:'Space Mono',monospace;font-size:10px;margin-bottom:8px;word-break:break-all;line-height:1.5}
#copylinkbtn{width:100%;background:transparent;border:1px solid var(--acc);color:var(--hi);border-radius:6px;padding:7px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
#copylinkbtn:hover{background:var(--hi);color:var(--bg)}
#msgs{flex:1;padding:12px 16px;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;gap:2px}
.mwrap{display:flex;flex-direction:column;animation:fs .25s ease forwards}
.mwrap.me{align-items:flex-end}.mwrap.them{align-items:flex-start}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mmeta{font-size:10px;color:var(--dim);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.mbub{max-width:82%;padding:9px 13px;font-size:13px;line-height:1.6;word-break:break-word;position:relative;cursor:pointer;user-select:none}
.me .mbub{background:var(--mbg);border:1px solid var(--mbdr);border-radius:12px 12px 2px 12px;color:var(--mtxt)}
.them .mbub{background:var(--tbg);border:1px solid var(--tbdr);border-radius:12px 12px 12px 2px;color:var(--ttxt)}
.mimg{max-width:220px;max-height:180px;border-radius:8px;display:block;cursor:pointer;object-fit:cover}
.sys{text-align:center;font-size:10px;color:var(--dim);padding:6px 0;text-transform:uppercase;opacity:.4}
.tstip{display:none;font-size:10px;color:var(--dim);margin-top:3px;opacity:.6}
.tstip.on{display:block}
.epick{display:none;position:absolute;bottom:calc(100% + 6px);background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:7px;z-index:50;flex-wrap:wrap;gap:3px;width:172px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.me .epick{right:0}.them .epick{left:0}.epick.on{display:flex}
.eopt{font-size:18px;padding:4px;cursor:pointer;border-radius:5px}.eopt:hover{background:var(--bdr)}
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;max-width:82%}
.rpill{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:2px 7px;font-size:12px;cursor:pointer;user-select:none}
.rpill:hover{background:var(--bdr)}.rpill.mer{border-color:var(--acc)}
#ctx{display:none;position:fixed;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:5px;z-index:600;box-shadow:0 6px 24px rgba(0,0,0,.7);min-width:160px}
#ctx.on{display:block}
.ci{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:12px;color:var(--txt);cursor:pointer;border-radius:6px;transition:background .15s}
.ci:hover{background:var(--bdr)}.ci.red{color:#d05050}.ci.red:hover{background:#2a1010}
#typing{min-height:18px;padding:2px 16px 4px;font-size:11px;color:var(--dim);font-style:italic;opacity:.65;flex-shrink:0}
#ina{padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--bdr);background:var(--bg);flex-shrink:0}
#flash{font-size:11px;color:#4a8a4a;min-height:14px;margin-bottom:4px}
.irow{display:flex;gap:6px;align-items:flex-end}
#minput{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;color:var(--txt);font-family:'Space Mono',monospace;font-size:16px;resize:none;line-height:1.5;height:52px;transition:border-color .2s}
#minput:focus{outline:none;border-color:var(--acc)}#minput::placeholder{color:var(--dim);opacity:.4}
.iside{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
#cc{font-size:10px;color:var(--dim)}.wcc{color:#8a4a3a!important}
.ibrow{display:flex;gap:4px}
#imgbtn{background:transparent;border:1px solid var(--bdr);color:var(--dim);border-radius:6px;padding:7px 9px;font-size:16px;cursor:pointer;min-height:40px;transition:all .2s}
#imgbtn:hover{border-color:var(--acc);color:var(--txt)}
#sndbtn{background:transparent;border:1px solid var(--acc);color:var(--hi);border-radius:6px;padding:7px 12px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;min-height:40px;white-space:nowrap}
#sndbtn:hover:not(:disabled){background:var(--hi);color:var(--bg)}#sndbtn:disabled{opacity:.4;cursor:not-allowed}
#fimg{display:none}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;align-items:center;justify-content:center}
#lb.on{display:flex}#lb img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
#lbx{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:none;border:none}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--acc);border-radius:8px;padding:9px 16px;font-size:12px;color:var(--txt);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1}
</style>
</head>
<body>
<div id="lb"><button id="lbx">✕</button><img id="lbimg" src="" alt=""/></div>
<div id="spin"><div class="sp"></div><p id="sptxt">connecting...</p><small>server may take ~30s to wake up</small></div>
<div id="toast"></div>
<div id="ctx">
  <div class="ci" id="ctx-copy">📋 Copy</div>
  <div class="ci" id="ctx-time">⏰ Timestamp</div>
  <div class="ci red" id="ctx-del">🗑️ Delete</div>
</div>

<div id="setup">
<div class="box">
  <h2>ghost.</h2>
  <p>anonymous real-time chat</p>
  <label>Your Name <span style="opacity:.35">(optional)</span></label>
  <input type="text" id="uname" placeholder="leave blank for random name" autocomplete="off"/>
  <label>Room Name</label>
  <input type="text" id="rname" placeholder="e.g. my-room" autocomplete="off"/>
  <label>Room Password <span style="opacity:.35">(optional)</span></label>
  <input type="password" id="rpass" placeholder="leave blank for public room"/>
  <p class="hint">🔒 password makes the room private</p>
  <label>Theme</label>
  <div class="tdots">
    <div class="tdot on" data-t="" title="Dark"></div>
    <div class="tdot" data-t="ocean" title="Ocean"></div>
    <div class="tdot" data-t="forest" title="Forest"></div>
    <div class="tdot" data-t="sunset" title="Sunset"></div>
    <div class="tdot" data-t="light" title="Light"></div>
  </div>
  <div id="serr"></div>
  <button class="gbtn" id="enterbtn">Enter →</button>
  <div class="sinfo">⚡ anonymsgn.onrender.com</div>
</div>
</div>

<div id="app">
  <div id="hdr">
    <div class="hrow">
      <h1>ghost.</h1>
      <div class="hbtns">
        <span id="onlinebadge"><span class="gdot"></span><span id="onlinecnt">1</span></span>
        <span id="rbadge">—</span>
        <button class="hbtn" id="sharebtn">🔗</button>
        <button class="hbtn" id="thmbtn">🎨</button>
        <button class="hbtn" id="mutebtn">🔔</button>
      </div>
    </div>
    <div id="idn"><span class="dot"></span>You are <span class="nm" id="myname">—</span><span style="margin-left:auto;font-size:10px;opacity:.2">🗑️24h</span></div>
    <div class="panel" id="tpanel">
      <div class="ptitle">Theme</div>
      <div class="tprow">
        <div class="tdot" data-t=""></div>
        <div class="tdot" data-t="ocean"></div>
        <div class="tdot" data-t="forest"></div>
        <div class="tdot" data-t="sunset"></div>
        <div class="tdot" data-t="light"></div>
      </div>
    </div>
    <div class="panel" id="sharepanel">
      <div class="ptitle">Share Room</div>
      <div id="shareurl"></div>
      <button id="copylinkbtn">📋 Copy Link</button>
    </div>
  </div>
  <div id="msgs"><div class="sys" id="ldmsg">joining room...</div></div>
  <div id="typing"></div>
  <div id="ina">
    <div id="flash"></div>
    <div class="irow">
      <textarea id="minput" placeholder="whisper something..." maxlength="280"></textarea>
      <div class="iside">
        <span id="cc">0/280</span>
        <div class="ibrow">
          <button id="imgbtn">📸</button>
          <button id="sndbtn" disabled>send →</button>
        </div>
      </div>
    </div>
    <input type="file" id="fimg" accept="image/*"/>
  </div>
</div>

<script>
// ghost. — all features — v3
const SRV="https://anonymsgn.onrender.com";
const EMOJIS=["👻","❤️","😂","😮","😢","🔥","👍","👎"];
const ADJ=["Silent","Shadow","Hollow","Ashen","Drifting","Nameless","Veiled","Pale","Lost","Echoing"];
const ANI=["Fox","Wolf","Bear","Owl","Hawk","Lynx","Deer","Crow","Moth","Viper","Raven","Ghost"];
function getId(){let i=sessionStorage.getItem("gid");if(!i){i=Math.random().toString(36).slice(2,9);sessionStorage.setItem("gid",i)}return i}
function genName(id){const h=id.split("").reduce((a,c)=>a+c.charCodeAt(0),0);return ADJ[h%ADJ.length]+" "+ANI[(h*7)%ANI.length]}
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):""}
function ago(ts){const d=Math.floor((Date.now()-ts)/1000);if(d<10)return"just now";if(d<60)return d+"s ago";if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago"}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2200)}
const ME=getId();
// Theme
let theme=localStorage.getItem("gtheme")||"";
function applyTheme(t){theme=t;document.body.dataset.theme=t;localStorage.setItem("gtheme",t);document.querySelectorAll(".tdot").forEach(d=>d.classList.toggle("on",d.dataset.t===t))}
applyTheme(theme);
document.querySelectorAll(".tdot").forEach(d=>d.addEventListener("click",()=>{applyTheme(d.dataset.t);closeAll()}));
// Sound
let muted=false;
function beep(){if(muted)return;try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(440,c.currentTime+.1);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.3);}catch(e){}}
// Lightbox
document.getElementById("lbx").onclick=()=>document.getElementById("lb").classList.remove("on");
function openLB(s){document.getElementById("lbimg").src=s;document.getElementById("lb").classList.add("on")}
// PWA
if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
// Panels
function closeAll(){document.querySelectorAll(".panel,.epick").forEach(p=>p.classList.remove("on"));document.getElementById("ctx").classList.remove("on")}
document.addEventListener("click",closeAll);
document.getElementById("thmbtn").addEventListener("click",e=>{const p=document.getElementById("tpanel");const w=p.classList.contains("on");closeAll();if(!w)p.classList.add("on");e.stopPropagation()});
document.getElementById("sharebtn").addEventListener("click",e=>{const p=document.getElementById("sharepanel");const w=p.classList.contains("on");closeAll();if(!w)p.classList.add("on");e.stopPropagation()});
document.getElementById("mutebtn").addEventListener("click",()=>{muted=!muted;document.getElementById("mutebtn").textContent=muted?"🔕":"🔔";toast(muted?"Sound off":"Sound on")});
document.getElementById("copylinkbtn").addEventListener("click",e=>{navigator.clipboard.writeText(document.getElementById("shareurl").textContent).then(()=>toast("🔗 Copied!"));e.stopPropagation()});
// Context menu
let ctxD=null;
function showCtx(ev,wrap,m,isMe,socket,room){ev.preventDefault();ev.stopPropagation();ctxD={wrap,m,isMe,socket,room};const ctx=document.getElementById("ctx");document.getElementById("ctx-del").style.display=isMe?"flex":"none";ctx.style.left=Math.min(ev.clientX,window.innerWidth-170)+"px";ctx.style.top=Math.min(ev.clientY,window.innerHeight-130)+"px";closeAll();ctx.classList.add("on")}
document.getElementById("ctx-copy").addEventListener("click",()=>{if(!ctxD)return;navigator.clipboard.writeText(ctxD.m.text||"[image]").then(()=>toast("📋 Copied!"));document.getElementById("ctx").classList.remove("on")});
document.getElementById("ctx-time").addEventListener("click",()=>{if(!ctxD)return;let tip=ctxD.wrap.querySelector(".tstip");if(!tip){tip=document.createElement("div");tip.className="tstip";ctxD.wrap.appendChild(tip)}tip.textContent=new Date(ctxD.m.ts).toLocaleString();tip.classList.toggle("on");document.getElementById("ctx").classList.remove("on")});
document.getElementById("ctx-del").addEventListener("click",()=>{if(!ctxD||!ctxD.isMe)return;ctxD.socket.emit("delete_message",{room:ctxD.room,msgId:ctxD.m.id,anonId:ME});ctxD.wrap.style.opacity="0";ctxD.wrap.style.transition="opacity .3s";setTimeout(()=>ctxD.wrap.remove(),300);document.getElementById("ctx").classList.remove("on")});
// Setup
const serr=document.getElementById("serr"),spinEl=document.getElementById("spin"),sptxt=document.getElementById("sptxt"),enterbtn=document.getElementById("enterbtn");
document.getElementById("uname").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("rname").focus()});
document.getElementById("rname").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("rpass").focus()});
document.getElementById("rpass").addEventListener("keydown",e=>{if(e.key==="Enter")doConnect()});
enterbtn.addEventListener("click",doConnect);
function doConnect(){
  const room=document.getElementById("rname").value.trim().replace(/\s+/g,"-").toLowerCase();
  const pass=document.getElementById("rpass").value.trim();
  const name=document.getElementById("uname").value.trim()||genName(ME);
  if(!room){serr.textContent="⚠ Enter a room name";return}
  serr.textContent="";enterbtn.disabled=true;spinEl.classList.add("on");sptxt.textContent="connecting...";
  connect(room,pass,name,1);
}
function connect(room,pass,name,tries){
  if(tries>4){spinEl.classList.remove("on");serr.textContent="⚠ Server unreachable. Try again in 30s.";enterbtn.disabled=false;return}
  sptxt.textContent=tries>1?"still connecting... ("+tries+"/4)":"connecting...";
  // Load socket.io script if not loaded
  function go(){
    // POLLING ONLY — most reliable on Render free tier
    const socket=io(SRV,{
      transports:["polling"],
      timeout:30000,
      forceNew:true,
      reconnectionAttempts:5,
      reconnectionDelay:2000
    });
    let ok=false;
    const timer=setTimeout(()=>{if(!ok){socket.disconnect();connect(room,pass,name,tries+1)}},25000);
    socket.on("connect",()=>{ok=true;clearTimeout(timer);socket.emit("join_room",{room,password:pass,username:name})});
    socket.on("wrong_password",()=>{clearTimeout(timer);spinEl.classList.remove("on");socket.disconnect();serr.textContent="⚠ Wrong password!";enterbtn.disabled=false});
    socket.on("load_messages",msgs=>{
      clearTimeout(timer);spinEl.classList.remove("on");
      document.getElementById("setup").style.display="none";
      document.getElementById("app").style.display="flex";
      document.getElementById("myname").textContent=name;
      document.getElementById("rbadge").textContent=(pass?"🔒 ":"")+room;
      document.getElementById("shareurl").textContent=window.location.origin+"?room="+encodeURIComponent(room);
      const box=document.getElementById("msgs");
      document.getElementById("ldmsg")?.remove();
      if(!msgs.length)addSys("be the first to speak",box);
      else{msgs.forEach(m=>addMsg(m,box,socket,room));setTimeout(()=>box.scrollTop=box.scrollHeight,50)}
      initChat(socket,room,name,pass,box);
    });
    socket.on("connect_error",err=>{console.log("err:",err.message);if(!ok){clearTimeout(timer);setTimeout(()=>connect(room,pass,name,tries+1),6000)}});
  }
  if(window.io){go()}
  else{
    const s=document.createElement("script");s.src=SRV+"/socket.io/socket.io.js";
    s.onload=go;
    s.onerror=()=>{sptxt.textContent="server waking up...";setTimeout(()=>connect(room,pass,name,tries+1),10000)};
    document.head.appendChild(s);
  }
}
function initChat(socket,room,name,pass,box){
  const inp=document.getElementById("minput"),sndbtn=document.getElementById("sndbtn"),cc=document.getElementById("cc"),flash=document.getElementById("flash"),typEl=document.getElementById("typing");
  socket.on("new_message",m=>{if(m.anonId!==ME){addMsg(m,box,socket,room);box.scrollTop=box.scrollHeight;beep();toast(m.anonName+" 👻")}});
  socket.on("message_deleted",({msgId})=>{const el=document.querySelector('[data-mid="'+msgId+'"]');if(el){el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),300)}});
  socket.on("update_reactions",({msgId,reactions})=>{const el=document.querySelector('[data-mid="'+msgId+'"] .reacts');if(el)drawReacts(el,reactions,msgId,socket,room)});
  socket.on("typing_update",u=>{typEl.textContent=!u.length?"":u.length===1?u[0]+" is typing...":u.join(", ")+" are typing..."});
  socket.on("online_count",n=>document.getElementById("onlinecnt").textContent=n);
  socket.on("system_message",d=>addSys(d.text,box));
  socket.on("disconnect",()=>addSys("disconnected...",box));
  socket.on("reconnect",()=>{addSys("reconnected ✓",box);socket.emit("join_room",{room,password:pass,username:name})});
  let tt;
  inp.addEventListener("input",()=>{const l=inp.value.length;cc.textContent=l+"/280";cc.className=l>240?"wcc":"";sndbtn.disabled=!inp.value.trim();socket.emit("typing_start",{room,anonName:name});clearTimeout(tt);tt=setTimeout(()=>socket.emit("typing_stop",{room}),2000)});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sndbtn.disabled)send()}});
  inp.addEventListener("focus",()=>setTimeout(()=>box.scrollTop=box.scrollHeight,250));
  sndbtn.addEventListener("click",send);
  document.getElementById("imgbtn").addEventListener("click",()=>document.getElementById("fimg").click());
  document.getElementById("fimg").addEventListener("change",function(){
    const f=this.files[0];if(!f)return;if(f.size>4*1024*1024){toast("Max 4MB");return}
    const r=new FileReader();r.onload=ev=>{const img=ev.target.result;const m={id:Date.now().toString(),text:null,image:img,anonId:ME,anonName:name,ts:Date.now(),reactions:{}};addMsg(m,box,socket,room);box.scrollTop=box.scrollHeight;socket.emit("send_message",{room,image:img,anonId:ME,anonName:name});flash.textContent="📸 sent";setTimeout(()=>flash.textContent="",1500)};r.readAsDataURL(f);this.value="";
  });
  function send(){const txt=inp.value.trim();if(!txt)return;const m={id:Date.now().toString(),text:txt,anonId:ME,anonName:name,ts:Date.now(),reactions:{}};addMsg(m,box,socket,room);box.scrollTop=box.scrollHeight;socket.emit("send_message",{room,text:txt,anonId:ME,anonName:name});socket.emit("typing_stop",{room});inp.value="";cc.textContent="0/280";cc.className="";sndbtn.disabled=true;flash.textContent="✓ sent";setTimeout(()=>flash.textContent="",1500)}
}
function addMsg(m,box,socket,room){
  const isMe=m.anonId===ME;
  const w=document.createElement("div");w.className="mwrap "+(isMe?"me":"them");w.dataset.mid=m.id;
  const meta=document.createElement("div");meta.className="mmeta";meta.textContent=(isMe?"you":esc(m.anonName||"ghost"))+" · "+ago(m.ts);
  const bub=document.createElement("div");bub.className="mbub";
  if(m.image){const img=document.createElement("img");img.src=m.image;img.className="mimg";img.addEventListener("click",ev=>{ev.stopPropagation();openLB(m.image)});bub.appendChild(img)}
  else bub.textContent=m.text||"";
  const pk=document.createElement("div");pk.className="epick";
  EMOJIS.forEach(e=>{const s=document.createElement("span");s.className="eopt";s.textContent=e;s.addEventListener("click",ev=>{ev.stopPropagation();socket.emit("add_reaction",{room,msgId:m.id,emoji:e,anonId:ME});pk.classList.remove("on")});pk.appendChild(s)});
  bub.appendChild(pk);
  bub.addEventListener("click",ev=>{if(ev.target.tagName==="IMG")return;const w2=pk.classList.contains("on");closeAll();if(!w2)pk.classList.add("on");ev.stopPropagation()});
  bub.addEventListener("contextmenu",ev=>showCtx(ev,w,m,isMe,socket,room));
  let lp;bub.addEventListener("touchstart",ev=>{lp=setTimeout(()=>showCtx({preventDefault:()=>{},stopPropagation:()=>{},clientX:ev.touches[0].clientX,clientY:ev.touches[0].clientY},w,m,isMe,socket,room),550)},{passive:true});
  bub.addEventListener("touchend",()=>clearTimeout(lp));bub.addEventListener("touchmove",()=>clearTimeout(lp));
  const re=document.createElement("div");re.className="reacts";
  if(m.reactions&&Object.keys(m.reactions).length)drawReacts(re,m.reactions,m.id,socket,room);
  w.appendChild(meta);w.appendChild(bub);w.appendChild(re);box.appendChild(w);
}
function drawReacts(el,reactions,msgId,socket,room){el.innerHTML="";Object.entries(reactions).forEach(([e,users])=>{if(!users.length)return;const p=document.createElement("span");p.className="rpill"+(users.includes(ME)?" mer":"");p.textContent=e+" "+users.length;p.addEventListener("click",()=>socket.emit("add_reaction",{room,msgId,emoji:e,anonId:ME}));el.appendChild(p)})}
function addSys(txt,box){const d=document.createElement("div");d.className="sys";d.textContent=txt;box.appendChild(d);box.scrollTop=box.scrollHeight}
</script>
</body>
