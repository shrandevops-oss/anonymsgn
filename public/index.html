<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ghost. — anonymous</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ghost."/>
  <meta name="description" content="Anonymous real-time chat"/>

  <!-- PWA Icons -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon-192.png"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #0a0a0f;
      font-family: 'Space Mono', monospace;
      color: #e0d8cc;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Safe area for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Install banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1a14;
      border: 1px solid #4a3a2a;
      border-radius: 10px;
      padding: 12px 20px;
      z-index: 999;
      font-size: 12px;
      color: #d4c8b4;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    #install-banner.show { display: flex; }

    #install-btn {
      background: #c8b49a;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #dismiss-btn {
      background: transparent;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }

    /* Setup */
    #setup-screen {
      position: fixed; inset: 0;
      background: #0a0a0f; z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }

    #setup-box {
      width: 100%; max-width: 420px;
      border: 1px solid #1e1e2a; border-radius: 12px;
      padding: 32px; background: #0e0e16;
    }

    #setup-box h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 26px; font-weight: 400; margin-bottom: 6px;
    }

    #setup-box p { font-size: 11px; color: #555; letter-spacing: 1px; margin-bottom: 24px; text-transform: uppercase; }

    .field-label { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; display: block; }

    .setup-input {
      width: 100%; background: #111118; border: 1px solid #222230;
      border-radius: 6px; padding: 12px; color: #e0d8cc;
      font-family: 'Space Mono', monospace; font-size: 14px; margin-bottom: 14px;
      transition: border-color 0.2s;
      /* Prevent zoom on iOS */
      font-size: 16px;
    }
    .setup-input:focus { outline: none; border-color: #6b5a46; }
    .setup-input::placeholder { color: #333; }

    #setup-error { font-size: 11px; color: #8a4a3a; margin-bottom: 12px; min-height: 16px; letter-spacing: 1px; }

    #start-btn {
      width: 100%; background: transparent; border: 1px solid #4a3a2a;
      color: #9a8a7a; border-radius: 6px; padding: 14px;
      font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer;
      letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
    }
    #start-btn:hover { background: #c8b49a; color: #0a0a0f; }

    .server-info {
      margin-top: 16px; font-size: 10px; color: #2a2a3a;
      letter-spacing: 1px; text-align: center; padding: 8px;
      border: 1px solid #1a1a22; border-radius: 6px;
    }

    /* App */
    #app {
      width: 100%; max-width: 640px;
      display: none; flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      position: relative; z-index: 1;
    }

    #header {
      padding: 20px 20px 12px; border-bottom: 1px solid #1e1e2a;
      background: #0a0a0f; z-index: 10; flex-shrink: 0;
    }

    .header-top { display: flex; align-items: baseline; justify-content: space-between; }

    #header h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 24px; font-weight: 400;
    }

    #room-badge {
      font-size: 10px; color: #555; letter-spacing: 2px;
      text-transform: uppercase; border: 1px solid #222; padding: 3px 8px; border-radius: 4px;
    }

    #identity { margin-top: 4px; font-size: 11px; color: #3a3a4a; display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a5a3a; display: inline-block; }
    #identity span.name { color: #7a6a5a; }

    #messages {
      flex: 1; padding: 16px;
      display: flex; flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrap { display: flex; flex-direction: column; margin-bottom: 10px; animation: fadeSlide 0.3s ease forwards; }
    .msg-wrap.mine { align-items: flex-end; }
    .msg-wrap.theirs { align-items: flex-start; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta { font-size: 10px; color: #3a3a4a; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

    .msg-bubble {
      max-width: 80%; padding: 10px 14px;
      font-family: 'Space Mono', monospace; font-size: 13px;
      line-height: 1.6; word-break: break-word;
    }

    .mine .msg-bubble { background: #1e1a14; border: 1px solid #3a2e22; border-radius: 12px 12px 2px 12px; color: #d4c8b4; }
    .theirs .msg-bubble { background: #13131c; border: 1px solid #1e1e2e; border-radius: 12px 12px 12px 2px; color: #c0b8cc; }

    .system-msg { text-align: center; font-size: 10px; color: #333; letter-spacing: 1px; padding: 4px 0 12px; text-transform: uppercase; }

    #input-area {
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid #1e1e2a;
      background: #0a0a0f; z-index: 10; flex-shrink: 0;
    }

    #flash { font-size: 11px; color: #5a8a5a; margin-bottom: 6px; letter-spacing: 1px; min-height: 14px; }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1; background: #111118; border: 1px solid #222230;
      border-radius: 8px; padding: 10px 12px; color: #e0d8cc;
      font-family: 'Space Mono', monospace;
      font-size: 16px; /* Prevent iOS zoom */
      resize: none; line-height: 1.5; transition: border-color 0.2s; height: 56px;
    }
    #msg-input:focus { outline: none; border-color: #6b5a46; }
    #msg-input::placeholder { color: #333; }

    .input-side { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    #char-count { font-size: 10px; color: #333; letter-spacing: 1px; }
    #char-count.warn { color: #8a4a3a; }

    #send-btn {
      background: transparent; border: 1px solid #4a3a2a; color: #9a8a7a;
      border-radius: 6px; padding: 10px 14px; font-family: 'Space Mono', monospace;
      font-size: 11px; cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; transition: all 0.2s; white-space: nowrap;
      /* Better touch target */
      min-height: 44px;
    }
    #send-btn:hover:not(:disabled) { background: #c8b49a; color: #0a0a0f; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  📲 Install ghost. as an app!
  <button id="install-btn">Install</button>
  <button id="dismiss-btn">✕</button>
</div>

<!-- Setup -->
<div id="setup-screen">
  <div id="setup-box">
    <h2>ghost.</h2>
    <p>anonymous real-time chat</p>

    <label class="field-label">Room Name</label>
    <input class="setup-input" id="room-name" placeholder="e.g. my-secret-room" autofocus/>

    <div id="setup-error"></div>
    <button id="start-btn">Enter the Void →</button>

    <div class="server-info">⚡ powered by NENE RA</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div id="header">
    <div class="header-top">
      <h1>ghost.</h1>
      <span id="room-badge">—</span>
    </div>
    <div id="identity">
      <span class="dot"></span>
      You are <span class="name" id="my-name"></span>
    </div>
  </div>

  <div id="messages">
    <div class="system-msg" id="loading">connecting...</div>
  </div>

  <div id="input-area">
    <div id="flash"></div>
    <div class="input-row">
      <textarea id="msg-input" placeholder="whisper something..." maxlength="280"></textarea>
      <div class="input-side">
        <span id="char-count">0/280</span>
        <button id="send-btn" disabled>send →</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ✅ Register Service Worker for PWA
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("SW registered"))
        .catch((e) => console.log("SW error:", e));
    });
  }

  // ✅ PWA Install prompt
  let deferredPrompt;
  const installBanner = document.getElementById("install-banner");
  const installBtn    = document.getElementById("install-btn");
  const dismissBtn    = document.getElementById("dismiss-btn");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.classList.add("show");
  });

  installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.classList.remove("show");
    }
  });

  dismissBtn.addEventListener("click", () => {
    installBanner.classList.remove("show");
  });

  // ✅ Hardcoded server URL
  const SERVER_URL = "https://anonymsgn.onrender.com";

  const ADJECTIVES = ["Silent","Shadow","Hollow","Ashen","Drifting","Nameless","Veiled","Pale","Lost","Echoing"];
  const ANIMALS    = ["Fox","Wolf","Bear","Owl","Hawk","Lynx","Deer","Crow","Moth","Viper","Raven","Ghost"];

  function getAnonId() {
    let id = sessionStorage.getItem("anonId");
    if (!id) { id = Math.random().toString(36).slice(2, 9); sessionStorage.setItem("anonId", id); }
    return id;
  }

  function getAnonName(id) {
    const hash = id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
    return `${ADJECTIVES[hash % ADJECTIVES.length]} ${ANIMALS[(hash * 7) % ANIMALS.length]}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 10) return "just now";
    if (diff < 60) return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    return Math.floor(diff / 3600) + "h ago";
  }

  const MY_ID   = getAnonId();
  const MY_NAME = getAnonName(MY_ID);

  document.getElementById("start-btn").addEventListener("click", connect);
  document.getElementById("room-name").addEventListener("keydown", (e) => {
    if (e.key === "Enter") connect();
  });

  function connect() {
    const room  = document.getElementById("room-name").value.trim().replace(/\s+/g,"-").toLowerCase();
    const errEl = document.getElementById("setup-error");
    if (!room) { errEl.textContent = "⚠ Please enter a room name"; return; }
    errEl.textContent = "";
    document.getElementById("start-btn").textContent = "Connecting...";

    const script = document.createElement("script");
    script.src = SERVER_URL + "/socket.io/socket.io.js";
    script.onload = () => startApp(room);
    script.onerror = () => {
      errEl.textContent = "⚠ Server waking up — wait 30 seconds and try again!";
      document.getElementById("start-btn").textContent = "Enter the Void →";
    };
    document.head.appendChild(script);
  }

  function startApp(room) {
    const socket = io(SERVER_URL);

    socket.on("connect", () => {
      document.getElementById("setup-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      document.getElementById("room-badge").textContent = "room: " + room;
      document.getElementById("my-name").textContent = MY_NAME;
      socket.emit("join_room", room);
    });

    socket.on("connect_error", () => {
      document.getElementById("setup-error").textContent = "⚠ Connection failed — wait 30s and retry";
      document.getElementById("start-btn").textContent = "Enter the Void →";
      document.getElementById("setup-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";
    });

    const msgBox = document.getElementById("messages");

    socket.on("load_messages", (messages) => {
      document.getElementById("loading")?.remove();
      if (messages.length === 0) {
        const sys = document.createElement("div");
        sys.className = "system-msg";
        sys.textContent = "be the first to speak into the void";
        msgBox.appendChild(sys);
      } else {
        messages.forEach(msg => renderMessage(msg, msgBox));
        msgBox.scrollTop = msgBox.scrollHeight;
      }
    });

    socket.on("new_message", (msg) => {
      if (msg.anonId !== MY_ID) {
        renderMessage(msg, msgBox);
        msgBox.scrollTop = msgBox.scrollHeight;
      }
    });

    socket.on("system_message", (data) => {
      const sys = document.createElement("div");
      sys.className = "system-msg";
      sys.textContent = data.text;
      msgBox.appendChild(sys);
      msgBox.scrollTop = msgBox.scrollHeight;
    });

    const input    = document.getElementById("msg-input");
    const sendBtn  = document.getElementById("send-btn");
    const charSpan = document.getElementById("char-count");
    const flash    = document.getElementById("flash");

    // Fix mobile keyboard pushing layout
    input.addEventListener("focus", () => {
      setTimeout(() => msgBox.scrollTop = msgBox.scrollHeight, 300);
    });

    input.addEventListener("input", () => {
      const len = input.value.length;
      charSpan.textContent = len + "/280";
      charSpan.className   = len > 240 ? "warn" : "";
      sendBtn.disabled     = input.value.trim().length === 0;
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
    });

    sendBtn.addEventListener("click", sendMessage);

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      renderMessage({ id: Date.now().toString(), text, anonId: MY_ID, anonName: MY_NAME, ts: Date.now() }, msgBox);
      msgBox.scrollTop = msgBox.scrollHeight;
      socket.emit("send_message", { room, text, anonId: MY_ID, anonName: MY_NAME });
      input.value = "";
      charSpan.textContent = "0/280";
      charSpan.className = "";
      sendBtn.disabled = true;
      flash.textContent = "✓ sent";
      setTimeout(() => flash.textContent = "", 1500);
    }
  }

  function renderMessage(msg, msgBox) {
    const isMe = msg.anonId === MY_ID;
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (isMe ? "mine" : "theirs");
    wrap.innerHTML = `
      <div class="msg-meta">${isMe ? "you" : escapeHtml(msg.anonName || "unknown")} · ${timeAgo(msg.ts)}</div>
      <div class="msg-bubble">${escapeHtml(msg.text)}</div>
    `;
    msgBox.appendChild(wrap);
  }
</script>
</body>
</html>
